<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BotHost - Auto Token Detection</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        header { text-align: center; margin-bottom: 40px; }
        h1 { font-size: 3rem; margin-bottom: 10px; }
        .subtitle { opacity: 0.9; font-size: 1.2rem; }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input, select {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: rgba(255,255,255,0.9);
            color: #333;
            font-size: 1rem;
        }
        .file-drop {
            border: 3px dashed rgba(255,255,255,0.5);
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .file-drop:hover { background: rgba(255,255,255,0.1); border-color: white; }
        .file-list { margin-top: 15px; }
        .file-item {
            background: rgba(255,255,255,0.2);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }
        button {
            background: #00d4aa;
            color: #000;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        button:disabled { background: #666; cursor: not-allowed; }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        .status.success { background: #00d4aa; color: #000; display: block; }
        .status.error { background: #ff4757; display: block; }
        .feature-box {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .nav-links { text-align: center; margin-top: 20px; }
        .nav-links a { color: #00d4aa; text-decoration: none; margin: 0 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 BotHost</h1>
            <p class="subtitle">Auto-Detects Token & Starts Bot</p>
        </header>

        <div class="feature-box">
            <h3>✨ How it works:</h3>
            <p>1. Upload your ZIP with all bot files</p>
            <p>2. We auto-find your BOT_TOKEN</p>
            <p>3. Bot starts automatically!</p>
        </div>

        <div class="card">
            <h2 style="margin-bottom: 20px;">Deploy Bot</h2>
            
            <form id="uploadForm">
                <div class="form-group">
                    <label>Bot Name (optional)</label>
                    <input type="text" name="name" placeholder="My Bot">
                </div>

                <div class="form-group">
                    <label>Upload ZIP or Files</label>
                    <div class="file-drop" id="dropZone">
                        <p>📁 Drop your bot folder/ZIP here</p>
                        <p style="font-size: 0.9rem; opacity: 0.8; margin-top: 10px;">
                            Include: bot.js, token.js, package.json, etc.
                        </p>
                        <input type="file" id="fileInput" multiple style="display: none;">
                    </div>
                    <div class="file-list" id="fileList"></div>
                </div>

                <button type="submit" id="deployBtn">🚀 Deploy & Start</button>
            </form>

            <div id="status" class="status"></div>
        </div>

        <div class="nav-links">
            <a href="/dashboard.html">📊 Dashboard</a>
            <a href="/login.html">🔐 Account</a>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        let files = [];

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.background = 'rgba(255,255,255,0.2)'; });
        dropZone.addEventListener('dragleave', () => dropZone.style.background = '');
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.background = '';
            handleFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        function handleFiles(fileList) {
            files = [...files, ...Array.from(fileList)];
            updateFileList();
        }

        function updateFileList() {
            fileList.innerHTML = files.map((f, i) => `
                <div class="file-item">
                    <span>${f.name}</span>
                    <span style="cursor:pointer" onclick="removeFile(${i})">❌</span>
                </div>
            `).join('');
        }

        function removeFile(i) {
            files.splice(i, 1);
            updateFileList();
        }

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('deployBtn');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            btn.textContent = '⏳ Deploying...';
            status.style.display = 'none';

            const formData = new FormData();
            formData.append('name', document.querySelector('[name="name"]').value);
            files.forEach(f => formData.append('files', f));

            try {
                const res = await fetch('/api/bots', {
                    method: 'POST',
                    body: formData,
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token') || ''}` }
                });
                
                const data = await res.json();
                
                if (data.success) {
                    status.className = 'status success';
                    status.innerHTML = `
                        ✅ <strong>Bot Started!</strong><br>
                        Platform: ${data.platform}<br>
                        Token found in: ${data.tokenSource}<br>
                        Entry: ${data.entryFile}<br><br>
                        <a href="/dashboard.html" style="color:#000;font-weight:bold">Go to Dashboard →</a>
                    `;
                    files = [];
                    updateFileList();
                } else {
                    throw new Error(data.error);
                }
            } catch (err) {
                status.className = 'status error';
                status.textContent = '❌ ' + err.message;
            }
            
            btn.disabled = false;
            btn.textContent = '🚀 Deploy & Start';
        });
    </script>
</body>
</html>
