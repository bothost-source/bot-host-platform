<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BotHost</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 400px;
        }
        .logo {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .logo p {
            opacity: 0.7;
            font-size: 1rem;
        }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            opacity: 0.6;
            transition: all 0.3s;
            border-bottom: 2px solid transparent;
        }
        .tab.active {
            opacity: 1;
            border-bottom-color: #00d4aa;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        input {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: rgba(0,0,0,0.2);
            color: #fff;
            font-size: 1rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
        input:focus {
            outline: none;
            border-color: #00d4aa;
        }
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: #00d4aa;
            color: #000;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .message {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }
        .error { background: #ff4757; display: block; }
        .success { background: #00d4aa; color: #000; display: block; }
        .back-link {
            text-align: center;
            margin-top: 20px;
            opacity: 0.6;
        }
        .back-link a {
            color: #fff;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🚀 BotHost</h1>
            <p>Free Bot Hosting Platform</p>
        </div>
        
        <div class="card">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('login')">Login</div>
                <div class="tab" onclick="switchTab('register')">Register</div>
            </div>
            
            <div id="message" class="message"></div>
            
            <!-- Login Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" id="loginBtn">Login</button>
            </form>
            
            <!-- Register Form (hidden by default) -->
            <form id="registerForm" style="display: none;">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Min 6 characters" required minlength="6">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" name="confirmPassword" placeholder="••••••••" required>
                </div>
                <button type="submit" id="registerBtn">Create Account</button>
            </form>
        </div>
        
        <div class="back-link">
            <a href="/">← Back to Home</a>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const message = document.getElementById('message');
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'login') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
            }
            hideMessage();
        }
        
        function showMessage(text, isError = false) {
            message.textContent = text;
            message.className = 'message ' + (isError ? 'error' : 'success');
        }
        
        function hideMessage() {
            message.className = 'message';
            message.textContent = '';
        }
        
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = 'Logging in...';
            hideMessage();
            
            const formData = new FormData(loginForm);
            
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: formData.get('email'),
                        password: formData.get('password')
                    })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('api_key', data.api_key);
                    showMessage('Login successful! Redirecting...');
                    setTimeout(() => window.location.href = '/dashboard.html', 1000);
                } else {
                    showMessage(data.error || 'Login failed', true);
                }
            } catch (e) {
                showMessage('Network error. Try again.', true);
            }
            
            btn.disabled = false;
            btn.textContent = 'Login';
        });
        
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.textContent = 'Creating account...';
            hideMessage();
            
            const formData = new FormData(registerForm);
            const password = formData.get('password');
            const confirmPassword = formData.get('confirmPassword');
            
            if (password !== confirmPassword) {
                showMessage('Passwords do not match', true);
                btn.disabled = false;
                btn.textContent = 'Create Account';
                return;
            }
            
            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: formData.get('email'),
                        password: password
                    })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('api_key', data.api_key);
                    showMessage('Account created! Redirecting...');
                    setTimeout(() => window.location.href = '/dashboard.html', 1000);
                } else {
                    showMessage(data.error || 'Registration failed', true);
                }
            } catch (e) {
                showMessage('Network error. Try again.', true);
            }
            
            btn.disabled = false;
            btn.textContent = 'Create Account';
        });
        
        // Check if already logged in
        if (localStorage.getItem('token')) {
            window.location.href = '/dashboard.html';
        }
    </script>
</body>
</html>
